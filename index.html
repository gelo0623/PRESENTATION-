<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excuse Generator 3000</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Fredoka', sans-serif;
    background:#0f172a;
    color:white;
    overflow:hidden;
}

.screen{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{display:flex;}

.card{
    background:#111827cc;
    padding:30px;
    border-radius:20px;
    width:340px;
}

input,select{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

#output{
    font-family:Arial;
    white-space:pre-line;
    text-align:left;
    font-size:14px;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div id="step1" class="screen active">
<div class="card">
<h1>Excuse Generator 3000</h1>
<button onclick="next('step2')">Start</button>
</div>
</div>

<!-- STEP 2 -->
<div id="step2" class="screen">
<div class="card">
<h1>Details</h1>
<input id="name" placeholder="Your Name">
<input id="target" placeholder="Teacher / Boss">
<button onclick="next('step3')">Next</button>
</div>
</div>

<!-- STEP 3 -->
<div id="step3" class="screen">
<div class="card">
<h1>Output Type</h1>
<select id="type">
<option value="message">Message</option>
<option value="email">Email</option>
</select>
<button onclick="next('step4')">Next</button>
</div>
</div>

<!-- STEP 4 -->
<div id="step4" class="screen">
<div class="card">
<h1>Situation</h1>
<select id="reason">
<option value="late">Late Submission</option>
<option value="absent">Absent</option>
<option value="nosubmit">No Submission</option>
<option value="lazy">Lazy</option>
<option value="group">Group Issue</option>
</select>
<button onclick="generate()">Generate</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
<h1>Output</h1>
<div id="output"></div>
<button onclick="copyText()">Copy</button>
</div>
</div>

<script>
function next(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ===== BASE KANAL EXCUSES ===== */
function getBase(reason, target, name){

const data = {
late:`Good day ${target}.

Sorry po sa late submission. Naunahan po ako ng “mamaya na” mentality ko.

- ${name}`,

absent:`Good day ${target}.

Absent po ako kasi yung katawan ko nasa school pero yung utak ko naka-airplane mode.

- ${name}`,

nosubmit:`Good day ${target}.

Naintindihan ko po yung task, pero yung motivation ko nag-file ng leave.

- ${name}`,

lazy:`Good day ${target}.

Wala po akong excuse. Tamad lang po talaga.

- ${name}`,

group:`Good day ${target}.

Group work po pero naging solo survival mode po.

- ${name}`
};

return data[reason];
}

/* ===== EMAIL MODE (LONG FORM FORMAL + FUNNY CORE) ===== */
function buildEmail(base, name, target){

return `Subject: Academic Submission Report

To: ${target}

Good day,

I hope this message finds you well.

I am writing this formal report to explain the status of my requirement.

--------------------------------------------------

${base}

--------------------------------------------------

I acknowledge the importance of deadlines and responsibility. I understand my shortcomings in time management and execution, and I will work on improving my consistency moving forward.

Thank you for your understanding.

Respectfully,
${name}`;
}

/* ===== MESSAGE MODE (CHAOTIC GEN Z PANIC 🌀💀) ===== */
function buildMessage(base){

const chaos=[
"wait let me explain",
"bro hindi ko talaga sinasadya",
"okay hear me out",
"teacher pls don't judge",
"this made sense earlier i swear",
"i swear this is valid 😭",
"everything was under control until it wasn't",
"my brain lagged mid-update",
"real talk idk what happened",
"this is not what it looks like"
];

const random = chaos[Math.floor(Math.random()*chaos.length)];

return `${random}

${base}

i swear this sounded better in my head 😭`;
}

/* ===== GENERATE ===== */
function generate(){

const name=document.getElementById("name").value || "Student";
const target=document.getElementById("target").value || "Sir/Ma'am";
const type=document.getElementById("type").value;
const reason=document.getElementById("reason").value;

const base = getBase(reason, target, name);

let output="";

if(type==="email"){
output = buildEmail(base, name, target);
}else{
output = buildMessage(base);
}

document.getElementById("output").innerText=output;
next("result");
}

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("Copied");
}
</script>

</body>
</html>
