<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excuse Generator 3000</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
overflow:hidden;
}

/* ===== HERO HEADER ===== */
.hero-title{
font-size:42px;
font-weight:bold;
text-align:center;
margin-top:40px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* BACKGROUND CHAOS */
.block{
position:absolute;
width:30px;
height:30px;
background:cyan;
opacity:0.08;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* SCREEN SYSTEM */
.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* BOX */
.box{
background:#111827;
padding:25px;
border-radius:15px;
width:360px;
text-align:center;
}

/* INPUT */
input,select{
width:90%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

/* BUTTON */
button{
padding:12px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
margin:5px;
animation:pulse 1.3s infinite;
}

/* PREMIUM */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.8);
}

.modal-box{
background:linear-gradient(45deg,gold,orange);
color:white;
padding:25px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 0 20px gold;
}

/* RESULT BOX */
.result-box{
background:#0f172a;
padding:15px;
border-radius:10px;
margin:10px 0;
text-align:left;
}

.copy-btn{
background:#22c55e;
padding:5px;
font-size:12px;
margin-top:5px;
}
</style>
</head>

<body>

<!-- CHAOS BACKGROUND -->
<script>
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="block";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(3+Math.random()*6)+"s";
document.body.appendChild(d);
}
</script>

<!-- HERO -->
<div id="page1" class="screen active">
<div class="hero-title">EXCUSE GENERATOR 3000</div>
<button onclick="next('page2')">START</button>
</div>

<!-- INPUT -->
<div id="page2" class="screen">
<div class="box">
<h2>Input Details</h2>
<input id="name" placeholder="Your Name">
<input id="teacher" placeholder="Teacher / Professor">
<button onclick="next('page3')">Submit</button>
</div>
</div>

<!-- TYPE -->
<div id="page3" class="screen">
<div class="box">
<h2>Choose Type</h2>

<select id="type">
<option value="email">Email</option>
<option value="message">Message</option>
</select>

<select id="tone" onchange="checkTone()">
<option value="formal">Formal</option>
<option value="informal">Informal</option>
</select>

<button onclick="next('page4')">Next</button>
</div>
</div>

<!-- SITUATION -->
<div id="page4" class="screen">
<div class="box">
<h2>Select Situation</h2>

<select id="reason">
<option value="late">Late</option>
<option value="absent">Absent</option>
<option value="nosubmit">No Submission</option>
<option value="lazy">Lazy</option>
<option value="group">Group Issue</option>
</select>

<button onclick="loading()">Generate</button>
</div>
</div>

<!-- LOADING -->
<div id="page5" class="screen">
<h2>Initializing your excuse...</h2>
<p>Please wait while system processes reality distortion...</p>
</div>

<!-- RESULT -->
<div id="page6" class="screen">
<div class="box">
<h2>Your Excuses</h2>
<div id="outputList"></div>
<button onclick="next('page4')">Back</button>
</div>
</div>

<!-- PREMIUM MODAL -->
<div class="modal" id="premium">
<div class="modal-box">
<h2>💰 PREMIUM REQUIRED</h2>
<p>Unlock Informal Mode for $999</p>
<button onclick="unlock()">Pay Now</button>
<button onclick="closePremium()">Back</button>
</div>
</div>

<script>

let unlocked=false;

/* NAV */
function next(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* CHAOTIC EXCUSES */
function generateList(reason){

const base={
late:"Sir I blinked and deadline disappeared",
absent:"I was present in another timeline",
nosubmit:"File exists but refused reality",
lazy:"Motivation left the universe",
group:"Group became solo survival mode"
};

let arr=[];
for(let i=0;i<10;i++){
arr.push(base[reason] + " #" + (i+1));
}
return arr;
}

/* LOADING */
function loading(){
next('page5');

setTimeout(()=>{
generate();
next('page6');
},2000);
}

/* PREMIUM */
function checkTone(){
let tone=document.getElementById("tone").value;
if(tone==="informal" && !unlocked){
document.getElementById("premium").style.display="flex";
}
}

function closePremium(){
document.getElementById("premium").style.display="none";
document.getElementById("tone").value="formal";
}

function unlock(){
unlocked=true;
document.getElementById("premium").style.display="none";
}

/* GENERATE */
function generate(){

let reason=document.getElementById("reason").value;
let type=document.getElementById("type").value;

let list=generateList(reason);

let html="";

list.forEach((e,i)=>{
html+=`
<div class="result-box">
${e}
<button class="copy-btn" onclick="copy('${e}')">Copy</button>
</div>
`;
});

document.getElementById("outputList").innerHTML=html;
}

/* COPY */
function copy(text){
navigator.clipboard.writeText(text);
alert("Copied");
}

</script>

</body>
</html>
