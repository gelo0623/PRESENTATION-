<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excuse Generator 3000</title>

<style>
:root{
--bg:#0f172a;
--card:#111827;
--text:white;
--accent:#38bdf8;
}

.light{
--bg:#e2e8f0;
--card:white;
--text:black;
--accent:#2563eb;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
overflow:hidden;
transition:0.3s;
}

/* BACKGROUND BLOCKS */
.block{
position:absolute;
width:40px;
height:40px;
background:var(--accent);
opacity:0.08;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-120vh) rotate(360deg);}
}

/* UI */
.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

/* FIXED BIG CARD */
.card{
background:var(--card);
padding:30px;
border-radius:15px;
width:450px;
max-height:80vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
margin:5px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}

#output{
white-space:pre-wrap;
font-family:Arial;
line-height:1.5;
}

/* TOP BUTTON */
.topbar{
position:absolute;
top:10px;
right:10px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:25px;
border-radius:12px;
width:300px;
text-align:center;
}
</style>
</head>

<body>

<!-- TOGGLE -->
<div class="topbar">
<button onclick="toggle()">Toggle Mode</button>
</div>

<!-- PREMIUM MODAL -->
<div class="modal" id="premiumModal">
<div class="modal-content">
<h2>🔒 Premium Locked</h2>
<p>Unlock Formal Mode for ₱999</p>
<button onclick="unlockPremium()">Unlock Now</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
/* BACKGROUND BLOCKS */
for(let i=0;i<18;i++){
let d=document.createElement("div");
d.className="block";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(d);
}
</script>

<!-- STEP 1 -->
<div id="s1" class="screen active">
<div class="card">
<h2>Excuse Generator 3000</h2>
<button onclick="next('s2')">Start</button>
</div>
</div>

<!-- STEP 2 -->
<div id="s2" class="screen">
<div class="card">
<h3>Type</h3>
<select id="type">
<option value="email">Email</option>
<option value="message">Message</option>
</select>

<button onclick="next('s3')">Next</button>
<button onclick="back('s1')">Back</button>
</div>
</div>

<!-- STEP 3 -->
<div id="s3" class="screen">
<div class="card">
<h3>Tone</h3>
<select id="tone">
<option value="formal">Formal Mode 🔒</option>
<option value="informal">Informal Chaos</option>
</select>

<button onclick="next('s4')">Next</button>
<button onclick="back('s2')">Back</button>
</div>
</div>

<!-- STEP 4 -->
<div id="s4" class="screen">
<div class="card">
<h3>Situation</h3>
<select id="reason">
<option value="late">Late Submission</option>
<option value="absent">Absent</option>
<option value="nosubmit">No Submission</option>
<option value="lazy">Lazy</option>
<option value="group">Group Issue</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="back('s3')">Back</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
<h2>Output</h2>
<div id="output"></div>
<button onclick="copy()">Copy</button>
<button onclick="back('s4')">Back</button>
</div>
</div>

<script>

let premium=false;

function next(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(id){
next(id);
}

function toggle(){
document.body.classList.toggle("light");
}

/* MODAL */
function openModal(){
document.getElementById("premiumModal").style.display="flex";
}
function closeModal(){
document.getElementById("premiumModal").style.display="none";
}
function unlockPremium(){
premium=true;
closeModal();
alert("Premium Unlocked (Fake 😭)");
}

/* EXCUSES */
function getInformal(r){

const d={
late:["Sir my notebook ate my dog 😭","Sir deadline scared my laptop so it shut down","Sir I blinked and it was due already"],
absent:["Sir I attended class in another timeline","Sir my body was present but brain AFK","Sir I think I was in parallel universe"],
nosubmit:["Sir I finished it mentally but forgot reality","Sir file went to dimension X","Sir submit button rejected me"],
lazy:["Sir productivity left the chat","Sir my brain said ‘nope’","Sir I was buffering IRL"],
group:["Sir group became solo survival","Sir teamwork disconnected mid-match","Sir we agreed spiritually"]
};

return d[r][Math.floor(Math.random()*d[r].length)];
}

function getFormal(r){

return `Dear Sir/Ma’am,

I respectfully submit this explanation regarding my requirement status.

${getInformal(r)}

I sincerely acknowledge my responsibility and will improve moving forward.

Thank you.`;
}

/* GENERATE */
function generate(){

let type=document.getElementById("type").value;
let tone=document.getElementById("tone").value;
let reason=document.getElementById("reason").value;

if(tone==="formal" && !premium){
openModal();
return;
}

let base = tone==="formal" ? getFormal(reason) : getInformal(reason);

if(type==="email"){
base = `Subject: Submission Report

Dear Sir/Ma’am,

${base}

Sincerely,
Student`;
}

document.getElementById("output").innerText=base;
next("result");
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("Copied");
}

</script>

</body>
</html>
