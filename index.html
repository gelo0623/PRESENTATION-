<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excuse Generator 3000</title>

<style>
:root{
--bg:#0f172a;
--card:#111827;
--text:white;
--accent:#38bdf8;
}

.light{
--bg:#e2e8f0;
--card:white;
--text:black;
--accent:#2563eb;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
overflow:hidden;
transition:0.4s;
}

/* BACKGROUND BLOCKS */
.block{
position:absolute;
width:40px;
height:40px;
background:var(--accent);
opacity:0.08;
animation:move 8s linear infinite;
}

@keyframes move{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-100vh) rotate(360deg);}
}

/* UI */
.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

.card{
background:var(--card);
padding:25px;
border-radius:15px;
width:350px;
}

input,select{
width:90%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
margin:5px;
animation:pulse 1.3s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* TOP BAR */
.topbar{
position:absolute;
top:10px;
right:10px;
z-index:10;
}

#output{
white-space:pre-line;
font-family:Arial;
}
</style>
</head>

<body>

<!-- TOGGLE -->
<div class="topbar">
<button onclick="toggle()">Toggle Mode</button>
</div>

<!-- BACKGROUND BLOCKS -->
<script>
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="block";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(d);
}
</script>

<!-- STEP 1 -->
<div id="s1" class="screen active">
<div class="card">
<h2>Excuse Generator 3000</h2>
<button onclick="next('s2')">Start</button>
</div>
</div>

<!-- STEP 2 -->
<div id="s2" class="screen">
<div class="card">
<h3>Type</h3>
<select id="type">
<option value="email">Email</option>
<option value="message">Message</option>
</select>

<button onclick="next('s3')">Next</button>
<button onclick="back('s1')">Back</button>
</div>
</div>

<!-- STEP 3 -->
<div id="s3" class="screen">
<div class="card">
<h3>Tone</h3>
<select id="tone">
<option value="formal">Formal (Premium 🔒 999)</option>
<option value="informal">Informal Chaos</option>
</select>

<button onclick="next('s4')">Next</button>
<button onclick="back('s2')">Back</button>
</div>
</div>

<!-- STEP 4 -->
<div id="s4" class="screen">
<div class="card">
<h3>Situation</h3>
<select id="reason">
<option value="late">Late</option>
<option value="absent">Absent</option>
<option value="nosubmit">No Submit</option>
<option value="lazy">Lazy</option>
<option value="group">Group Issue</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="back('s3')">Back</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="card">
<h3>Output</h3>
<div id="output"></div>
<button onclick="copy()">Copy</button>
<button onclick="back('s4')">Back</button>
</div>
</div>

<script>
function next(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(id){
next(id);
}

function toggle(){
document.body.classList.toggle("light");
}

/* EXCUSES */
function getInformal(reason){
const d={
late:["Sir my notebook ate my dog 😭","Sir deadline scared my laptop so it shut down","Sir I blinked and suddenly it was due"],
absent:["Sir I attended class in another timeline","Sir my body was present but brain on airplane mode","Sir alarm and I had a legal dispute"],
nosubmit:["Sir I finished it mentally but forgot reality","Sir file went to another dimension","Sir submit button rejected me"],
lazy:["Sir productivity left the chat","Sir my brain said no today","Sir I was buffering in real life"],
group:["Sir group became solo survival mode","Sir we agreed spiritually only","Sir teamwork disconnected mid-loading"]
};
return d[reason][Math.floor(Math.random()*d[reason].length)];
}

function getFormal(reason){
return `🔒 PREMIUM MODE REQUIRED

Upgrade to PRO (₱999) to unlock formal excuses.

Still here’s free chaos:

${getInformal(reason)}`;
}

function generate(){
let type=document.getElementById("type").value;
let tone=document.getElementById("tone").value;
let reason=document.getElementById("reason").value;

let base = tone==="formal" ? getFormal(reason) : getInformal(reason);

if(type==="email"){
base = `Subject: Submission Report

Dear Sir/Ma’am,

${base}

Sincerely,
Student`;
}

document.getElementById("output").innerText=base;
next("result");
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("Copied");
}
</script>

</body>
</html>
