<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excuse Generator 3000</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
overflow:hidden;
}

.hero-title{
font-size:44px;
font-weight:bold;
text-align:center;
margin-top:50px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.block{
position:absolute;
width:30px;
height:30px;
background:#38bdf8;
opacity:0.08;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

.box{
background:#111827;
padding:25px;
border-radius:15px;
width:380px;
text-align:center;
}

input,select{
width:90%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
margin:5px;
animation:pulse 1.2s infinite;
}

.result-box{
background:#0f172a;
padding:12px;
border-radius:10px;
margin:10px 0;
text-align:left;
}

.copy-btn{
background:#22c55e;
padding:5px;
font-size:12px;
margin-top:5px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:linear-gradient(45deg,gold,orange);
padding:25px;
border-radius:15px;
text-align:center;
width:300px;
}
</style>
</head>

<body>

<!-- CHAOS BACKGROUND -->
<script>
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="block";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(3+Math.random()*6)+"s";
document.body.appendChild(d);
}
</script>

<!-- PAGE 1 -->
<div id="page1" class="screen active">
<div class="hero-title">EXCUSE GENERATOR 3000</div>
<button onclick="next('page2')">START</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="screen">
<div class="box">
<h2>Input Details</h2>
<input id="name" placeholder="Your Name">
<input id="teacher" placeholder="Teacher / Professor">

<button onclick="next('page3')">Next</button>
</div>
</div>

<!-- PAGE 3 -->
<div class="screen" id="page3">
<div class="box">
<h2>Type</h2>

<select id="type">
<option value="email">Email</option>
<option value="message">Message</option>
</select>

<button onclick="next('page4')">Next</button>
</div>
</div>

<!-- PAGE 4 -->
<div class="screen" id="page4">
<div class="box">
<h2>Situation</h2>

<select id="reason">
<option value="late">Late</option>
<option value="absent">Absent</option>
<option value="nosubmit">No Submission</option>
<option value="lazy">Lazy</option>
<option value="group">Group Issue</option>
</select>

<button onclick="generate()">Generate</button>
</div>
</div>

<!-- RESULT -->
<div class="screen" id="page5">
<div class="box">
<h2>Result</h2>
<div id="output"></div>
<button onclick="back('page5')">Back</button>
</div>
</div>

<script>

/* NAV */
function next(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){
next('page4');
}

/* =========================
   🔥 YOUR CUSTOM EXCUSES
   EDIT HERE ONLY
========================= */
function gen(reason){

const data = {
late: `Sir/Ma'am, I sincerely apologize for the late submission. I underestimated the time required and got delayed due to poor planning.`,
absent: `Sir/Ma'am, I was unable to attend due to unforeseen personal circumstances that affected my availability.`,
nosubmit: `Sir/Ma'am, I acknowledge that I failed to submit the requirement due to lack of proper time management.`,
lazy: `Sir/Ma'am, I honestly struggled with motivation and failed to complete the task on time.`,
group: `Sir/Ma'am, our group experienced coordination issues which affected our ability to complete the output properly.`
};

return data[reason];
}

/* =========================
   📧 EMAIL FORMAT (LONG)
========================= */
function buildEmail(msg,name,teacher){
return `
Subject: Academic Requirement Submission

To: ${teacher}

Good day,

I hope this message finds you well.

I am writing this email to formally explain my submission regarding the assigned academic requirement.

--------------------------------------------------

${msg}

--------------------------------------------------

I fully understand the importance of deadlines and academic responsibility. I take full accountability for this and will improve my performance moving forward.

Thank you for your understanding and consideration.

Respectfully,
${name}
`;
}

/* =========================
   💬 MESSAGE FORMAT (RAW)
========================= */
function buildMessage(msg){
return msg;
}

/* =========================
   GENERATE OUTPUT
========================= */
function generate(){

let name=document.getElementById("name").value || "Student";
let teacher=document.getElementById("teacher").value || "Sir/Ma'am";
let type=document.getElementById("type").value;
let reason=document.getElementById("reason").value;

let msg = gen(reason);

let output="";

if(type==="email"){
output = buildEmail(msg,name,teacher);
}else{
output = buildMessage(msg);
}

document.getElementById("output").innerText=output;
next('page5');
}

</script>

</body>
</html>
